# planmatetest — PlanMate 테스트 API 리버스 프록시
#
# 프론트엔드는 Vercel(https://planmate.site, *.vercel.app)에서 서빙 → API는 이 호스트(cross-origin).
# 이 nginx의 역할: 경로 라우팅만 (커뮤니티 MSA vs 레거시 백엔드). prod의 nginx ingress와 동일 구조.
# CORS는 nginx가 아니라 각 스프링 백엔드가 처리한다 (아래 "필수 전제" 참고).

upstream planmate_legacy   { server 127.0.0.1:8090; }   # 레거시 Backend 포트에 맞출 것
upstream planmate_community { server 127.0.0.1:8081; }   # Community 포트에 맞출 것

server {
    listen 443 ssl;
    http2 on;
    server_name planmatetest.example.com;   # ← Vercel VITE_API_URL · TLS 인증서 · 커뮤니티 CORS와 반드시 동일

    # Vercel이 https이므로 mixed-content 방지 위해 TLS 필수
    ssl_certificate     /etc/letsencrypt/live/planmatetest.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/planmatetest.example.com/privkey.pem;

    client_max_body_size 1024m;              # 이미지 업로드 (prod ingress proxy-body-size와 동일)

    # 커뮤니티 마이크로서비스 — / 룰보다 먼저 매칭 (prod ingress와 동일하게 prefix)
    location /api/community {
        proxy_pass http://planmate_community;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
    }

    # 나머지(/api/*, OAuth 콜백 등) → 레거시 백엔드
    location / {
        proxy_pass http://planmate_legacy;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
    }
}

# http → https 리다이렉트
server {
    listen 80;
    server_name planmatetest.example.com;
    return 301 https://$host$request_uri;
}
