spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import: optional:classpath:application-secret.yml

  main:
    web-application-type: servlet

  jackson:
    time-zone: Asia/Seoul

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/community}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 100

  flyway:
    enabled: true
    baseline-on-migrate: false

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

jwt:
  secret: ${JWT_SECRET:bG9jYWwtZGV2LXNlY3JldC1sb2NhbC1kZXYtc2VjcmV0LWxvY2FsLWRldi1zZWNyZXQ=}
  secret-encoding: ${JWT_SECRET_ENCODING:base64}

internal:
  api-base-url: ${MAIN_BACKEND_URL:http://localhost:8080}
  api-token: ${INTERNAL_API_TOKEN:local-internal-token}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:community}
  public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

logging:
  level:
    org.springframework: WARN
    org.hibernate: WARN
    org.apache.catalina: WARN
    com.planmate: DEBUG

server:
  port: ${SERVER_PORT:8081}
  servlet:
    encoding:
      enabled: true
      force: true
      charset: UTF-8

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
